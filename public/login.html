<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — DMC Portal</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    .card{width:100%;max-width:420px;background:#161b22;border:1px solid #30363d;border-radius:16px;padding:32px}
    .logo{text-align:center;margin-bottom:28px}
    .logo-icon{font-size:40px;margin-bottom:8px}
    .logo-title{font-size:20px;font-weight:700;color:#e6edf3}
    .logo-sub{font-size:13px;color:#8b949e;margin-top:4px}

    .tabs{display:flex;background:#0d1117;border-radius:8px;padding:4px;margin-bottom:24px;gap:4px}
    .tab{flex:1;padding:8px;text-align:center;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:#8b949e;border:none;background:transparent;transition:all .2s}
    .tab.active{background:#1f6feb;color:#fff}

    .form-group{margin-bottom:16px}
    label{display:block;font-size:13px;color:#8b949e;margin-bottom:6px}
    input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 14px;color:#e6edf3;font-size:15px;outline:none;transition:border-color .2s}
    input:focus{border-color:#388bfd}
    input::placeholder{color:#484f58}

    .btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:4px}
    .btn-primary{background:#1f6feb;color:#fff}
    .btn-primary:hover:not(:disabled){background:#388bfd}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed}

    .alert{padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
    .alert-error{background:#3a1a1a;border:1px solid #f8514955;color:#f85149}
    .alert-success{background:#1a3a2a;border:1px solid #2ea04355;color:#3fb950}

    .otp-hint{font-size:12px;color:#8b949e;margin-top:8px;text-align:center}
    .step{display:none}
    .step.active{display:block}

    .back-btn{background:none;border:none;color:#8b949e;font-size:13px;cursor:pointer;margin-bottom:16px;padding:0}
    .back-btn:hover{color:#e6edf3}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🏛️</div>
    <div class="logo-title">Delhi Municipal Corporation</div>
    <div class="logo-sub">Citizen & Admin Portal</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-type="citizen">📱 Citizen</button>
    <button class="tab"        data-type="admin">🔐 Admin</button>
  </div>

  <div id="alertBox" class="alert"></div>

  <!-- Step 1: Enter identifier -->
  <div class="step active" id="step1">
    <div class="form-group" id="phoneGroup">
      <label>Your registered mobile number</label>
      <input type="tel" id="phoneInput" placeholder="9876543210" maxlength="10"/>
    </div>
    <div class="form-group" id="emailGroup" style="display:none">
      <label>Admin email address</label>
      <input type="email" id="emailInput" placeholder="admin@dmc.gov.in"/>
    </div>
    <button class="btn btn-primary" id="sendOtpBtn">Send OTP</button>
  </div>

  <!-- Step 2: Enter OTP -->
  <div class="step" id="step2">
    <button class="back-btn" id="backBtn">← Back</button>
    <div class="form-group">
      <label id="otpLabel">Enter OTP sent to your phone</label>
      <input type="text" id="otpInput" placeholder="______" maxlength="6" style="letter-spacing:8px;font-size:22px;text-align:center"/>
    </div>
    <div class="otp-hint" id="otpHint"></div>
    <button class="btn btn-primary" id="verifyBtn" style="margin-top:16px">Verify & Login</button>
  </div>
</div>

<script>
(function(){
  let loginType = 'citizen';
  let identifier = '';

  const tabs       = document.querySelectorAll('.tab');
  const step1      = document.getElementById('step1');
  const step2      = document.getElementById('step2');
  const phoneGroup = document.getElementById('phoneGroup');
  const emailGroup = document.getElementById('emailGroup');
  const phoneInput = document.getElementById('phoneInput');
  const emailInput = document.getElementById('emailInput');
  const sendOtpBtn = document.getElementById('sendOtpBtn');
  const verifyBtn  = document.getElementById('verifyBtn');
  const otpInput   = document.getElementById('otpInput');
  const otpLabel   = document.getElementById('otpLabel');
  const otpHint    = document.getElementById('otpHint');
  const backBtn    = document.getElementById('backBtn');
  const alertBox   = document.getElementById('alertBox');

  const next = new URLSearchParams(location.search).get('next') || '/';

  tabs.forEach(t => t.addEventListener('click', () => {
    tabs.forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    loginType = t.dataset.type;
    phoneGroup.style.display = loginType === 'citizen' ? '' : 'none';
    emailGroup.style.display = loginType === 'admin'   ? '' : 'none';
    hideAlert();
  }));

  sendOtpBtn.addEventListener('click', async () => {
    identifier = loginType === 'citizen' ? phoneInput.value.trim() : emailInput.value.trim();
    if (!identifier) { showAlert('error', 'Please enter your ' + (loginType === 'citizen' ? 'phone number' : 'email')); return; }

    sendOtpBtn.disabled = true;
    sendOtpBtn.textContent = 'Sending…';
    hideAlert();

    try {
      const res  = await fetch('/api/auth/send-otp', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ identifier, type: loginType }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');

      showAlert('success', `OTP sent to ${identifier}`);
      otpLabel.textContent = `Enter OTP sent to ${identifier}`;
      otpHint.textContent  = 'OTP is valid for 5 minutes';
      step1.classList.remove('active');
      step2.classList.add('active');
      setTimeout(() => otpInput.focus(), 100);
    } catch(err) {
      showAlert('error', err.message);
    } finally {
      sendOtpBtn.disabled = false;
      sendOtpBtn.textContent = 'Send OTP';
    }
  });

  verifyBtn.addEventListener('click', async () => {
    const otp = otpInput.value.trim();
    if (otp.length < 6) { showAlert('error', 'Enter the 6-digit OTP'); return; }

    verifyBtn.disabled = true;
    verifyBtn.textContent = 'Verifying…';
    hideAlert();

    try {
      const res  = await fetch('/api/auth/verify-otp', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ identifier, otp, type: loginType }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Invalid OTP');

      // Redirect based on role
      window.location.href = data.role === 'admin' ? (next === '/' ? '/tickets' : next) : '/my-tickets';
    } catch(err) {
      showAlert('error', err.message);
      verifyBtn.disabled = false;
      verifyBtn.textContent = 'Verify & Login';
    }
  });

  backBtn.addEventListener('click', () => {
    step2.classList.remove('active');
    step1.classList.add('active');
    otpInput.value = '';
    hideAlert();
  });

  otpInput.addEventListener('keydown', e => { if(e.key==='Enter') verifyBtn.click(); });
  phoneInput.addEventListener('keydown', e => { if(e.key==='Enter') sendOtpBtn.click(); });
  emailInput.addEventListener('keydown', e => { if(e.key==='Enter') sendOtpBtn.click(); });

  function showAlert(type, msg) {
    alertBox.className = 'alert alert-' + type;
    alertBox.textContent = msg;
    alertBox.style.display = 'block';
  }
  function hideAlert() { alertBox.style.display = 'none'; }
})();
</script>
</body>
</html>
