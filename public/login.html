<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Delhi Municipal Corporation</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#060a12;--surface:#0d1420;--surface2:#111827;
      --border:#1e2d45;--border2:#243447;
      --blue:#2563eb;--blue2:#3b82f6;--blue3:#60a5fa;
      --cyan:#06b6d4;--text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
      --green:#22c55e;--red:#ef4444;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

    /* noise */
    body::after{content:'';position:fixed;inset:0;z-index:0;opacity:.03;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

    /* nav */
    .nav{background:rgba(6,10,18,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .nav-logo-text{font-size:13px;font-weight:700;color:var(--text);line-height:1.2}
    .nav-logo-sub{font-size:10px;color:var(--muted);font-weight:400}
    .nav-back{font-size:13px;color:var(--muted2);text-decoration:none;transition:color .2s;display:flex;align-items:center;gap:6px}
    .nav-back:hover{color:var(--text)}

    /* center content */
    .page{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 16px;position:relative;z-index:1}

    /* gradient orb bg */
    .page::before{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(37,99,235,.08),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}

    .card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;position:relative;overflow:hidden}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--cyan))}

    .logo{text-align:center;margin-bottom:32px}
    .logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px}
    .logo-title{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.01em}
    .logo-sub{font-size:13px;color:var(--muted);margin-top:4px}

    .tabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:28px;gap:4px}
    .tab{flex:1;padding:10px;text-align:center;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted2);border:none;background:transparent;transition:all .25s}
    .tab:hover{color:var(--text)}
    .tab.active{background:var(--blue);color:#fff;box-shadow:0 2px 12px rgba(37,99,235,.35)}

    .form-group{margin-bottom:18px}
    label{display:block;font-size:13px;color:var(--muted2);margin-bottom:8px;font-weight:500}
    input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:15px;outline:none;transition:border-color .25s,box-shadow .25s}
    input:focus{border-color:var(--blue3);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
    input::placeholder{color:var(--muted)}

    .btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .25s;margin-top:4px}
    .btn-primary{background:var(--blue);color:#fff}
    .btn-primary:hover:not(:disabled){background:var(--blue2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(37,99,235,.4)}
    .btn-primary:active:not(:disabled){transform:translateY(0)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed}

    .alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:18px;display:none;animation:fadeIn .3s ease}
    .alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171}
    .alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green)}

    .otp-hint{font-size:12px;color:var(--muted);margin-top:10px;text-align:center}
    .step{display:none}
    .step.active{display:block;animation:fadeIn .3s ease}

    .back-btn{background:none;border:none;color:var(--muted2);font-size:13px;cursor:pointer;margin-bottom:18px;padding:0;display:flex;align-items:center;gap:6px;transition:color .2s}
    .back-btn:hover{color:var(--text)}

    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    .footer-note{text-align:center;margin-top:24px;font-size:12px;color:var(--muted)}
    .footer-note a{color:var(--blue3);text-decoration:none}
    .footer-note a:hover{text-decoration:underline}
  </style>
</head>
<body>

<div class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">🏛️</div>
      <div>
        <div class="nav-logo-text">Delhi Municipal Corporation</div>
        <div class="nav-logo-sub">AI Citizen Helpline</div>
      </div>
    </a>
    <a href="/" class="nav-back">Home</a>
  </div>
</div>

<div class="page">
  <div>
    <div class="card">
      <div class="logo">
        <div class="logo-icon">🏛️</div>
        <div class="logo-title">Welcome Back</div>
        <div class="logo-sub">Sign in to track your complaints</div>
      </div>

      <div class="tabs">
        <button class="tab active" data-type="citizen">Citizen</button>
        <button class="tab"        data-type="admin">Admin</button>
      </div>

      <div id="alertBox" class="alert"></div>

      <!-- Step 1: Enter identifier -->
      <div class="step active" id="step1">
        <div class="form-group" id="phoneGroup">
          <label>Registered mobile number</label>
          <input type="tel" id="phoneInput" placeholder="9876543210" maxlength="10"/>
        </div>
        <div class="form-group" id="emailGroup" style="display:none">
          <label>Admin email address</label>
          <input type="email" id="emailInput" placeholder="admin@dmc.gov.in"/>
        </div>
        <button class="btn btn-primary" id="sendOtpBtn">Send OTP</button>
      </div>

      <!-- Step 2: Enter OTP -->
      <div class="step" id="step2">
        <button class="back-btn" id="backBtn">← Back</button>
        <div class="form-group">
          <label id="otpLabel">Enter OTP sent to your phone</label>
          <input type="text" id="otpInput" placeholder="------" maxlength="6" style="letter-spacing:8px;font-size:22px;text-align:center;font-weight:700"/>
        </div>
        <div class="otp-hint" id="otpHint"></div>
        <button class="btn btn-primary" id="verifyBtn" style="margin-top:16px">Verify & Login</button>
      </div>
    </div>

    <div class="footer-note">
      Need help? Call <a href="tel:011-23456789">011-23456789</a> or visit <a href="/">DMC Portal</a>
    </div>
  </div>
</div>

<script>
(function(){
  let loginType = 'citizen';
  let identifier = '';

  const tabs       = document.querySelectorAll('.tab');
  const step1      = document.getElementById('step1');
  const step2      = document.getElementById('step2');
  const phoneGroup = document.getElementById('phoneGroup');
  const emailGroup = document.getElementById('emailGroup');
  const phoneInput = document.getElementById('phoneInput');
  const emailInput = document.getElementById('emailInput');
  const sendOtpBtn = document.getElementById('sendOtpBtn');
  const verifyBtn  = document.getElementById('verifyBtn');
  const otpInput   = document.getElementById('otpInput');
  const otpLabel   = document.getElementById('otpLabel');
  const otpHint    = document.getElementById('otpHint');
  const backBtn    = document.getElementById('backBtn');
  const alertBox   = document.getElementById('alertBox');

  const next = new URLSearchParams(location.search).get('next') || '/';

  tabs.forEach(t => t.addEventListener('click', () => {
    tabs.forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    loginType = t.dataset.type;
    phoneGroup.style.display = loginType === 'citizen' ? '' : 'none';
    emailGroup.style.display = loginType === 'admin'   ? '' : 'none';
    hideAlert();
  }));

  sendOtpBtn.addEventListener('click', async () => {
    identifier = loginType === 'citizen' ? phoneInput.value.trim() : emailInput.value.trim();
    if (!identifier) { showAlert('error', 'Please enter your ' + (loginType === 'citizen' ? 'phone number' : 'email')); return; }

    sendOtpBtn.disabled = true;
    sendOtpBtn.textContent = 'Sending…';
    hideAlert();

    try {
      const res  = await fetch('/api/auth/send-otp', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ identifier, type: loginType }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');

      showAlert('success', `OTP sent to ${identifier}`);
      otpLabel.textContent = `Enter OTP sent to ${identifier}`;
      otpHint.textContent  = 'OTP is valid for 5 minutes';
      step1.classList.remove('active');
      step2.classList.add('active');
      setTimeout(() => otpInput.focus(), 100);
    } catch(err) {
      showAlert('error', err.message);
    } finally {
      sendOtpBtn.disabled = false;
      sendOtpBtn.textContent = 'Send OTP';
    }
  });

  verifyBtn.addEventListener('click', async () => {
    const otp = otpInput.value.trim();
    if (otp.length < 6) { showAlert('error', 'Enter the 6-digit OTP'); return; }

    verifyBtn.disabled = true;
    verifyBtn.textContent = 'Verifying…';
    hideAlert();

    try {
      const res  = await fetch('/api/auth/verify-otp', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ identifier, otp, type: loginType }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Invalid OTP');

      // Redirect based on role
      window.location.href = data.role === 'admin' ? (next === '/' ? '/tickets' : next) : '/my-tickets';
    } catch(err) {
      showAlert('error', err.message);
      verifyBtn.disabled = false;
      verifyBtn.textContent = 'Verify & Login';
    }
  });

  backBtn.addEventListener('click', () => {
    step2.classList.remove('active');
    step1.classList.add('active');
    otpInput.value = '';
    hideAlert();
  });

  otpInput.addEventListener('keydown', e => { if(e.key==='Enter') verifyBtn.click(); });
  phoneInput.addEventListener('keydown', e => { if(e.key==='Enter') sendOtpBtn.click(); });
  emailInput.addEventListener('keydown', e => { if(e.key==='Enter') sendOtpBtn.click(); });

  function showAlert(type, msg) {
    alertBox.className = 'alert alert-' + type;
    alertBox.textContent = msg;
    alertBox.style.display = 'block';
  }
  function hideAlert() { alertBox.style.display = 'none'; }
})();
</script>
</body>
</html>
