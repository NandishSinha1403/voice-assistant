<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | Samadhan</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .login-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-card { width: 100%; max-width: 400px; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <div style="font-size: 2rem;">🏛️</div>
        <div class="brand-text">
          <span class="brand-name">Samadhan</span>
          <span class="brand-sub">AI Citizen Helpline</span>
        </div>
      </a>
      <a href="/" class="btn btn-secondary">Home</a>
    </div>
  </div>
</nav>

<div class="login-container">
  <div class="card login-card text-center">
    <div style="font-size: 3rem; margin-bottom: 1rem;">🔐</div>
    <h2 style="margin-bottom: 0.5rem;">Official Login</h2>
    <p class="ui-text mb-2" style="color: var(--color-text-muted);">Access AI Helpline Management Portal</p>
    
    <div style="display: flex; gap: 1rem; border-bottom: 1px solid var(--color-border); margin-bottom: 2rem;">
      <button id="tab-login" class="ui-text" style="flex: 1; padding: 0.75rem; background: none; border: none; border-bottom: 3px solid var(--color-navy); color: var(--color-navy); cursor: pointer; font-weight: 700;">LOGIN</button>
      <button id="tab-register" class="ui-text" style="flex: 1; padding: 0.75rem; background: none; border: none; border-bottom: 3px solid transparent; color: var(--color-text-muted); cursor: pointer; font-weight: 700;">REGISTER</button>
    </div>

    <form id="login-form">
      <div class="form-group" style="text-align: left;">
        <label class="label">Email Address</label>
        <input type="email" id="email" placeholder="name@dmc.gov.in" required>
      </div>
      <div class="form-group" style="text-align: left;">
        <label class="label">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Authenticate</button>
    </form>

    <form id="register-form" style="display: none;">
      <div class="form-group" style="text-align: left;">
        <label class="label">Full Name</label>
        <input type="text" id="reg-name" placeholder="Official Name" required>
      </div>
      <div class="form-group" style="text-align: left;">
        <label class="label">Official Email</label>
        <input type="email" id="reg-email" placeholder="name@dmc.gov.in" required>
      </div>
      <div class="form-group" style="text-align: left;">
        <label class="label">Password</label>
        <input type="password" id="reg-password" placeholder="Minimum 8 characters" required>
      </div>
      <button type="submit" class="btn btn-saffron" style="width: 100%; padding: 1rem;">Create Account</button>
    </form>
    
    <p id="error-msg" class="ui-text mt-1" style="color: #ef4444; font-weight: 700; display: none;"></p>
  </div>
</div>

<footer class="footer" style="padding: 2rem 0;">
  <div class="container text-center">
    <p class="ui-text" style="color: rgba(255,255,255,0.5);">© 2026 Samadhan. Authorized Personnel Only.</p>
  </div>
</footer>

<script>
  const tabLogin = document.getElementById('tab-login');
  const tabRegister = document.getElementById('tab-register');
  const loginForm = document.getElementById('login-form');
  const registerForm = document.getElementById('register-form');
  const errorMsg = document.getElementById('error-msg');

  tabLogin.onclick = () => {
    tabLogin.style.borderColor = 'var(--color-navy)';
    tabLogin.style.color = 'var(--color-navy)';
    tabRegister.style.borderColor = 'transparent';
    tabRegister.style.color = 'var(--color-text-muted)';
    loginForm.style.display = 'block';
    registerForm.style.display = 'none';
    errorMsg.style.display = 'none';
  };

  tabRegister.onclick = () => {
    tabRegister.style.borderColor = 'var(--color-navy)';
    tabRegister.style.color = 'var(--color-navy)';
    tabLogin.style.borderColor = 'transparent';
    tabLogin.style.color = 'var(--color-text-muted)';
    registerForm.style.display = 'block';
    loginForm.style.display = 'none';
    errorMsg.style.display = 'none';
  };

  loginForm.onsubmit = async (e) => {
    e.preventDefault();
    errorMsg.style.display = 'none';
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/tickets';
      } else {
        errorMsg.textContent = data.message || 'Login failed';
        errorMsg.style.display = 'block';
      }
    } catch (err) {
      errorMsg.textContent = 'Network error. Please try again.';
      errorMsg.style.display = 'block';
    }
  };

  registerForm.onsubmit = async (e) => {
    e.preventDefault();
    errorMsg.style.display = 'none';
    const name = document.getElementById('reg-name').value;
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-password').value;

    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (res.ok) {
        tabLogin.click();
        alert('Registration successful! Please login.');
      } else {
        errorMsg.textContent = data.message || 'Registration failed';
        errorMsg.style.display = 'block';
      }
    } catch (err) {
      errorMsg.textContent = 'Network error. Please try again.';
      errorMsg.style.display = 'block';
    }
  };
</script>

</body>
</html>
