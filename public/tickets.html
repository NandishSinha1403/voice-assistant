<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — Delhi Municipal Corporation</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#060a12;--surface:#0d1420;--surface2:#111827;
      --border:#1e2d45;--border2:#243447;
      --blue:#2563eb;--blue2:#3b82f6;--blue3:#60a5fa;
      --cyan:#06b6d4;--text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
      --green:#22c55e;--red:#ef4444;--purple:#a855f7;--amber:#f59e0b;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    body::after{content:'';position:fixed;inset:0;z-index:0;opacity:.03;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

    /* nav */
    .topbar{background:rgba(6,10,18,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:100}
    .topbar-inner{max-width:1200px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between}
    .topbar-left{display:flex;align-items:center;gap:12px}
    .topbar-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .topbar-title{font-size:14px;font-weight:700}
    .topbar-sub{font-size:10px;color:var(--muted)}
    .topbar-right{display:flex;align-items:center;gap:14px}
    .live-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted2)}
    .live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .nav-link{font-size:13px;color:var(--muted2);text-decoration:none;padding:6px 12px;border-radius:6px;transition:all .2s}
    .nav-link:hover{color:var(--text);background:rgba(255,255,255,.05)}
    .logout-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted2);padding:7px 14px;font-size:12px;cursor:pointer;font-weight:500;transition:all .2s}
    .logout-btn:hover{border-color:var(--red);color:var(--red)}

    /* layout */
    .main{padding:28px 24px;max-width:1200px;margin:0 auto;position:relative;z-index:1}

    /* stats */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;transition:border-color .2s}
    .stat-card:hover{border-color:var(--border2)}
    .stat-value{font-size:32px;font-weight:800;color:var(--blue3);line-height:1}
    .stat-label{font-size:12px;color:var(--muted);margin-top:6px;font-weight:500}
    .stat-value.green{color:var(--green)}
    .stat-value.purple{color:#c084fc}

    /* toolbar */
    .toolbar{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;align-items:center}
    .search-wrap{position:relative;flex:1;min-width:200px}
    .search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px 10px 38px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
    .search-wrap input:focus{border-color:var(--blue3)}
    .search-wrap input::placeholder{color:var(--muted)}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
    .filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;color:var(--muted2);font-size:13px;cursor:pointer;transition:all .2s;font-weight:500}
    .filter-btn:hover{border-color:var(--blue3);color:var(--text)}
    .filter-btn.active{border-color:var(--blue);color:var(--blue3);background:rgba(37,99,235,.08)}
    .refresh-btn{background:var(--blue);border:none;border-radius:8px;padding:10px 18px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
    .refresh-btn:hover{background:var(--blue2);transform:translateY(-1px)}

    /* ── DESKTOP TABLE ── */
    .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    th{padding:14px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06rem;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)}
    td{padding:14px 16px;font-size:14px;border-bottom:1px solid rgba(30,45,69,.5);vertical-align:top}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(37,99,235,.03)}
    .ticket-id-cell{font-weight:700;color:var(--blue3);white-space:nowrap}
    .complaint-cell{color:var(--text);max-width:260px}
    .complaint-text{overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.5}
    .name-cell{white-space:nowrap;font-weight:500}
    .phone-cell{color:var(--muted2);white-space:nowrap;font-size:13px}
    .date-cell{color:var(--muted);font-size:12px;white-space:nowrap}
    .files-cell{text-align:center}

    /* status pills */
    .status-pill{display:inline-block;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:600}
    .status-open{background:rgba(37,99,235,.12);color:var(--blue3);border:1px solid rgba(37,99,235,.25)}
    .status-in-progress{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.25)}
    .status-resolved{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
    .status-closed{background:rgba(100,116,139,.12);color:var(--muted2);border:1px solid rgba(100,116,139,.25)}

    /* action buttons */
    .actions-cell{white-space:nowrap}
    .action-link{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:7px;font-size:12px;font-weight:600;text-decoration:none;background:rgba(255,255,255,.04);color:var(--muted2);border:1px solid var(--border);margin-right:6px;transition:all .2s;cursor:pointer}
    .action-link:hover{border-color:var(--blue3);color:var(--blue3);background:rgba(37,99,235,.06)}
    .action-start{border-color:rgba(168,85,247,.25);color:#c084fc}
    .action-start:hover{border-color:var(--purple);background:rgba(168,85,247,.08)}
    .action-resolve{border-color:rgba(34,197,94,.25);color:var(--green)}
    .action-resolve:hover{border-color:var(--green);background:rgba(34,197,94,.08)}

    /* severity chips */
    .sev-chip{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;min-width:28px;text-align:center}
    .sev-low{background:#22c55e}
    .sev-mid{background:#f59e0b}
    .sev-high{background:#ef4444}

    /* group rows */
    .group-row{cursor:pointer;background:rgba(37,99,235,.04)}
    .group-row:hover td{background:rgba(37,99,235,.08)}
    .group-arrow{display:inline-block;transition:transform .2s;margin-right:6px;font-size:10px}
    .group-arrow.open{transform:rotate(90deg)}
    .count-badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:700;background:rgba(37,99,235,.15);color:var(--blue3);margin-left:8px}
    .sub-row td{padding-left:36px !important;opacity:.85}
    .sub-row td:first-child{padding-left:36px !important}

    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
    .badge-green{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}

    /* empty */
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-icon{font-size:48px;margin-bottom:12px;opacity:.6}
    .empty-title{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--text)}
    .empty-sub{font-size:13px}

    .spinner{display:inline-block;width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--blue3);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── MOBILE CARD VIEW ── */
    .mobile-cards{display:none}
    .m-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;transition:border-color .2s}
    .m-card:hover{border-color:var(--border2)}
    .m-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:8px}
    .m-card-id{font-weight:700;color:var(--blue3);font-size:14px}
    .m-card-complaint{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .m-card-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--muted);margin-bottom:14px}
    .m-card-actions{display:flex;gap:8px;flex-wrap:wrap}

    @media(max-width:900px){
      .stats{grid-template-columns:repeat(2,1fr)}
    }
    @media(max-width:768px){
      .table-wrap{display:none}
      .mobile-cards{display:block}
      .main{padding:20px 16px}
      .topbar-title{font-size:13px}
      .live-indicator span:last-child{display:none}
    }
    @media(max-width:480px){
      .stats{grid-template-columns:1fr 1fr}
      .stat-card{padding:16px}
      .stat-value{font-size:26px}
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-left">
      <div class="topbar-icon">🏛️</div>
      <div>
        <div class="topbar-title">DMC Admin Dashboard</div>
        <div class="topbar-sub">Delhi Municipal Corporation</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="live-indicator">
        <div class="live-dot"></div>
        <span>Live</span>
      </div>
      <a href="/" class="nav-link">Home</a>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>
  </div>
</div>

<div class="main">

  <div class="stats" id="statsRow">
    <div class="stat-card"><div class="stat-value" id="statTotal">—</div><div class="stat-label">Total Tickets</div></div>
    <div class="stat-card"><div class="stat-value" id="statOpen">—</div><div class="stat-label">Open</div></div>
    <div class="stat-card"><div class="stat-value green" id="statFiles">—</div><div class="stat-label">Files Uploaded</div></div>
    <div class="stat-card"><div class="stat-value purple" id="statToday">—</div><div class="stat-label">Today</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by name, phone, or complaint…"/>
    </div>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="open">Open</button>
    <button class="filter-btn" data-filter="in-progress">In Progress</button>
    <button class="filter-btn" data-filter="resolved">Resolved</button>
    <button class="filter-btn" id="groupBtn">Group similar</button>
    <button class="filter-btn" id="sortSevBtn">Sort by severity ↓</button>
    <button class="refresh-btn" id="refreshBtn">Refresh</button>
  </div>

  <!-- Desktop table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Ticket ID</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Complaint</th>
          <th>Severity</th>
          <th>Status</th>
          <th>Files</th>
          <th>Filed</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="9" style="text-align:center;padding:40px"><div class="spinner"></div></td></tr>
      </tbody>
    </table>
  </div>

  <!-- Mobile card view -->
  <div class="mobile-cards" id="mobileCards"></div>

</div>

<script>
(function () {
  let allTickets   = [];
  let activeFilter = 'all';
  let groupMode    = false;
  let sortBySev    = false;
  let expandedGroups = new Set();

  const tableBody   = document.getElementById('tableBody');
  const mobileCards = document.getElementById('mobileCards');
  const searchInput = document.getElementById('searchInput');
  const refreshBtn  = document.getElementById('refreshBtn');
  const groupBtn    = document.getElementById('groupBtn');
  const sortSevBtn  = document.getElementById('sortSevBtn');

  // ── Severity chip helper ────────────────────────────────────────────────────
  function sevChip(score) {
    const s = score || 0;
    const cls = s <= 3 ? 'sev-low' : s <= 6 ? 'sev-mid' : 'sev-high';
    return '<span class="sev-chip ' + cls + '">' + s + '</span>';
  }

  // ── Similarity helpers ──────────────────────────────────────────────────────
  function normalizeWords(text) {
    return String(text || '').toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim().split(' ').filter(Boolean);
  }

  function jaccardSim(a, b) {
    var setA = new Set(a), setB = new Set(b), inter = 0;
    setA.forEach(function(w) { if (setB.has(w)) inter++; });
    var union = setA.size + setB.size - inter;
    return union === 0 ? 0 : inter / union;
  }

  function isSimilar(t1, t2) {
    var w1 = normalizeWords(t1.complaint), w2 = normalizeWords(t2.complaint);
    var n1 = w1.join(' '), n2 = w2.join(' ');
    if (n1.includes(n2) || n2.includes(n1)) return true;
    return jaccardSim(w1, w2) >= 0.6;
  }

  function groupTickets(arr) {
    var sorted = arr.slice().sort(function(a, b) { return new Date(a.createdAt) - new Date(b.createdAt); });
    var groups = [];
    sorted.forEach(function(t) {
      var found = false;
      for (var i = 0; i < groups.length; i++) {
        if (isSimilar(groups[i].representative, t)) {
          groups[i].tickets.push(t);
          if ((t.severityScore || 0) > (groups[i].representative.severityScore || 0)) {
            groups[i].representative = t;
          }
          groups[i].count = groups[i].tickets.length;
          groups[i].aggregateSeverity = Math.min(10, (groups[i].representative.severityScore || 0) + groups[i].count - 1);
          found = true;
          break;
        }
      }
      if (!found) {
        groups.push({ representative: t, tickets: [t], count: 1, aggregateSeverity: t.severityScore || 0 });
      }
    });
    groups.sort(function(a, b) { return b.aggregateSeverity - a.aggregateSeverity; });
    return groups;
  }

  // ── Data loading ────────────────────────────────────────────────────────────
  async function load() {
    try {
      const res = await fetch('/api/tickets');
      allTickets = await res.json();
      updateStats();
      render();
    } catch {
      tableBody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#f87171;padding:40px">Failed to load tickets</td></tr>';
      mobileCards.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><div class="empty-title">Failed to load</div></div>';
    }
  }

  function updateStats() {
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('statTotal').textContent = allTickets.length;
    document.getElementById('statOpen').textContent  = allTickets.filter(t => t.status === 'open').length;
    document.getElementById('statFiles').textContent = allTickets.reduce((s, t) => s + (t.files?.length || 0), 0);
    document.getElementById('statToday').textContent = allTickets.filter(t => t.createdAt?.startsWith(today)).length;
  }

  // ── Render a single ticket row ──────────────────────────────────────────────
  function ticketRow(t, extraClass) {
    const date    = new Date(t.createdAt);
    const dateStr = date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    const timeStr = date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    const statusClass = (t.status || 'open').replace(' ', '-');
    return '<tr class="' + (extraClass || '') + '">' +
      '<td class="ticket-id-cell">' + esc(t.id) + '</td>' +
      '<td class="name-cell">' + esc(t.name) + '</td>' +
      '<td class="phone-cell">' + esc(t.phone) + '</td>' +
      '<td class="complaint-cell"><div class="complaint-text" title="' + esc(t.complaint) + '">' + esc(t.complaint) + '</div></td>' +
      '<td>' + sevChip(t.severityScore) + '</td>' +
      '<td><span class="status-pill status-' + statusClass + '">' + (t.status || 'open') + '</span></td>' +
      '<td class="files-cell">' + (t.files?.length ? '<span class="badge badge-green">📎 ' + t.files.length + '</span>' : '<span style="color:var(--muted)">—</span>') + '</td>' +
      '<td class="date-cell">' + dateStr + '<br>' + timeStr + '</td>' +
      '<td class="actions-cell">' +
        '<a class="action-link" href="/upload/' + (t.uploadToken || '') + '" target="_blank">📎 Docs</a>' +
        (t.status === 'open' ? '<button class="action-link action-start" data-action="status" data-id="' + t.id + '" data-status="in-progress">▶ Start</button>' : '') +
        (t.status === 'in-progress' ? '<button class="action-link action-resolve" data-action="status" data-id="' + t.id + '" data-status="resolved">✓ Resolve</button>' : '') +
      '</td></tr>';
  }

  // ── Render a mobile card ────────────────────────────────────────────────────
  function mobileCard(t) {
    const date = new Date(t.createdAt).toLocaleString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
    const statusClass = (t.status || 'open').replace(' ', '-');
    return '<div class="m-card">' +
      '<div class="m-card-top">' +
        '<div class="m-card-id">' + esc(t.id) + '</div>' +
        '<div>' + sevChip(t.severityScore) + ' <span class="status-pill status-' + statusClass + '">' + (t.status || 'open') + '</span></div>' +
      '</div>' +
      '<div class="m-card-complaint">' + esc(t.complaint) + '</div>' +
      '<div class="m-card-meta">' +
        '<span>' + esc(t.name) + '</span><span>' + esc(t.phone) + '</span><span>📅 ' + date + '</span>' +
        (t.files?.length ? '<span>📎 ' + t.files.length + ' files</span>' : '') +
      '</div>' +
      '<div class="m-card-actions">' +
        '<a class="action-link" href="/upload/' + (t.uploadToken || '') + '" target="_blank">📎 Docs</a>' +
        (t.status === 'open' ? '<button class="action-link action-start" data-action="status" data-id="' + t.id + '" data-status="in-progress">▶ Start</button>' : '') +
        (t.status === 'in-progress' ? '<button class="action-link action-resolve" data-action="status" data-id="' + t.id + '" data-status="resolved">✓ Resolve</button>' : '') +
      '</div></div>';
  }

  // ── Main render ─────────────────────────────────────────────────────────────
  function render() {
    const q = searchInput.value.toLowerCase().trim();
    let list = allTickets.filter(t => {
      if (activeFilter !== 'all' && t.status !== activeFilter) return false;
      if (!q) return true;
      return (t.name + t.phone + t.complaint + t.id).toLowerCase().includes(q);
    });

    if (sortBySev && !groupMode) {
      list.sort(function(a, b) { return (b.severityScore || 0) - (a.severityScore || 0); });
    }

    if (!list.length) {
      const emptyHtml = '<div class="empty-state"><div class="empty-icon">📭</div>' +
        '<div class="empty-title">' + (allTickets.length === 0 ? 'No tickets yet' : 'No matching tickets') + '</div>' +
        '<div class="empty-sub">' + (allTickets.length === 0 ? 'Complaints filed via phone calls will appear here.' : 'Try a different search or filter.') + '</div></div>';
      tableBody.innerHTML = '<tr><td colspan="9">' + emptyHtml + '</td></tr>';
      mobileCards.innerHTML = emptyHtml;
      return;
    }

    if (groupMode) {
      renderGrouped(list);
    } else {
      tableBody.innerHTML = list.map(function(t) { return ticketRow(t, ''); }).join('');
      mobileCards.innerHTML = list.map(mobileCard).join('');
    }
  }

  // ── Grouped render ──────────────────────────────────────────────────────────
  function renderGrouped(list) {
    var groups = groupTickets(list);
    var html = '';
    var mHtml = '';

    groups.forEach(function(g, gi) {
      var rep = g.representative;
      var isOpen = expandedGroups.has(gi);
      var date = new Date(rep.createdAt);
      var dateStr = date.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
      var timeStr = date.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
      var statusClass = (rep.status || 'open').replace(' ', '-');

      // Group header row
      html += '<tr class="group-row" data-group="' + gi + '">' +
        '<td class="ticket-id-cell"><span class="group-arrow ' + (isOpen ? 'open' : '') + '">▶</span>' + esc(rep.id) + '</td>' +
        '<td class="name-cell">' + esc(rep.name) + '</td>' +
        '<td class="phone-cell">' + esc(rep.phone) + '</td>' +
        '<td class="complaint-cell"><div class="complaint-text" title="' + esc(rep.complaint) + '">' + esc(rep.complaint) + '</div>' +
          (g.count > 1 ? '<span class="count-badge">×' + g.count + '</span>' : '') + '</td>' +
        '<td>' + sevChip(g.aggregateSeverity) + '</td>' +
        '<td><span class="status-pill status-' + statusClass + '">' + (rep.status || 'open') + '</span></td>' +
        '<td class="files-cell">' + (rep.files?.length ? '<span class="badge badge-green">📎 ' + rep.files.length + '</span>' : '<span style="color:var(--muted)">—</span>') + '</td>' +
        '<td class="date-cell">' + dateStr + '<br>' + timeStr + '</td>' +
        '<td class="actions-cell">' +
          '<a class="action-link" href="/upload/' + (rep.uploadToken || '') + '" target="_blank">📎 Docs</a>' +
          (rep.status === 'open' ? '<button class="action-link action-start" data-action="status" data-id="' + rep.id + '" data-status="in-progress">▶ Start</button>' : '') +
          (rep.status === 'in-progress' ? '<button class="action-link action-resolve" data-action="status" data-id="' + rep.id + '" data-status="resolved">✓ Resolve</button>' : '') +
        '</td></tr>';

      // Sub-rows (if expanded and group has more than 1)
      if (isOpen && g.count > 1) {
        g.tickets.forEach(function(t) {
          if (t.id === rep.id) return; // skip representative
          html += ticketRow(t, 'sub-row');
        });
      }

      // Mobile: show representative card with count badge
      mHtml += mobileCard(rep);
    });

    tableBody.innerHTML = html;
    mobileCards.innerHTML = mHtml;
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Events ──────────────────────────────────────────────────────────────────
  searchInput.addEventListener('input', render);
  refreshBtn.addEventListener('click', load);

  // Filter buttons (exclude groupBtn and sortSevBtn)
  document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      render();
    });
  });

  // Group toggle
  groupBtn.addEventListener('click', () => {
    groupMode = !groupMode;
    groupBtn.classList.toggle('active', groupMode);
    expandedGroups.clear();
    render();
  });

  // Sort by severity toggle
  sortSevBtn.addEventListener('click', () => {
    sortBySev = !sortBySev;
    sortSevBtn.classList.toggle('active', sortBySev);
    render();
  });

  // Expand/collapse group rows
  document.addEventListener('click', (e) => {
    const row = e.target.closest('.group-row');
    if (row) {
      const gi = parseInt(row.dataset.group, 10);
      if (expandedGroups.has(gi)) expandedGroups.delete(gi); else expandedGroups.add(gi);
      render();
      return;
    }
  });

  // Auth check
  fetch('/api/auth/me').then(r => { if (!r.ok) location.href = '/login?next=/tickets'; });
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    location.href = '/login';
  });

  // Status update — works for both table and mobile cards
  document.addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-action="status"]');
    if (!btn) return;
    e.stopPropagation(); // prevent group expand/collapse
    const id     = btn.dataset.id;
    const status = btn.dataset.status;
    const note   = prompt('Add a note for ticket ' + id + ' (optional):');
    await fetch('/api/admin/ticket/' + id + '/status', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: status, note: note || undefined }),
    });
    load();
  });

  // Auto-refresh every 10 seconds
  load();
  setInterval(load, 10000);
})();
</script>
</body>
</html>
