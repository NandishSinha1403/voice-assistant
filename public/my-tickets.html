<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Complaints — Delhi Municipal Corporation</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#060a12;--surface:#0d1420;--surface2:#111827;
      --border:#1e2d45;--border2:#243447;
      --blue:#2563eb;--blue2:#3b82f6;--blue3:#60a5fa;
      --cyan:#06b6d4;--text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
      --green:#22c55e;--red:#ef4444;--purple:#a855f7;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    body::after{content:'';position:fixed;inset:0;z-index:0;opacity:.03;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

    /* nav */
    .nav{background:rgba(6,10,18,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
    .nav-left{display:flex;align-items:center;gap:10px}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .nav-logo-text{font-size:13px;font-weight:700;color:var(--text);line-height:1.2}
    .nav-logo-sub{font-size:10px;color:var(--muted);font-weight:400}
    .nav-right{display:flex;align-items:center;gap:12px}
    .nav-link{font-size:13px;color:var(--muted2);text-decoration:none;transition:color .2s;padding:6px 12px;border-radius:6px}
    .nav-link:hover{color:var(--text);background:rgba(255,255,255,.05)}
    .phone-badge{font-size:12px;color:var(--blue3);background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.2);padding:4px 12px;border-radius:20px;font-weight:600}
    .logout-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted2);padding:7px 14px;font-size:12px;cursor:pointer;font-weight:500;transition:all .2s}
    .logout-btn:hover{border-color:var(--red);color:var(--red)}

    /* layout */
    .main{padding:32px 24px;max-width:760px;margin:0 auto;position:relative;z-index:1}
    .welcome{margin-bottom:32px}
    .welcome-title{font-size:24px;font-weight:800;margin-bottom:6px;letter-spacing:-.02em}
    .welcome-sub{font-size:14px;color:var(--muted2)}

    /* ticket cards */
    .ticket-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px;transition:all .25s;position:relative;overflow:hidden}
    .ticket-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:0;transition:opacity .3s}
    .ticket-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 8px 30px rgba(37,99,235,.1)}
    .ticket-card:hover::before{opacity:1}

    .ticket-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:12px}
    .ticket-id{font-size:16px;font-weight:700;color:var(--blue3);letter-spacing:.02em}
    .status-pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
    .status-open{background:rgba(37,99,235,.12);color:var(--blue3);border:1px solid rgba(37,99,235,.25)}
    .status-in-progress{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.25)}
    .status-resolved{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
    .status-closed{background:rgba(100,116,139,.12);color:var(--muted2);border:1px solid rgba(100,116,139,.25)}

    .complaint-text{font-size:14px;color:var(--text);margin-bottom:14px;line-height:1.6}
    .ticket-meta{display:flex;gap:20px;flex-wrap:wrap}
    .meta-item{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}

    .notes-section{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
    .notes-label{font-size:11px;font-weight:700;letter-spacing:.1rem;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .note{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px}
    .note-text{color:var(--text);margin-bottom:4px;font-size:13px;line-height:1.5}
    .note-meta{font-size:11px;color:var(--muted)}

    .upload-link{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:8px 14px;background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.2);border-radius:8px;font-size:12px;color:var(--blue3);text-decoration:none;font-weight:600;transition:all .2s}
    .upload-link:hover{background:rgba(37,99,235,.15);border-color:var(--blue);transform:translateY(-1px)}

    /* empty */
    .empty{text-align:center;padding:80px 24px;color:var(--muted)}
    .empty-icon{font-size:56px;margin-bottom:16px;opacity:.6}
    .empty-title{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text)}
    .empty-sub{font-size:14px;line-height:1.6}
    .empty-cta{display:inline-flex;align-items:center;gap:8px;margin-top:24px;padding:12px 24px;background:var(--blue);color:#fff;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;transition:all .2s}
    .empty-cta:hover{background:var(--blue2);transform:translateY(-2px)}

    /* loading */
    .spinner{display:inline-block;width:24px;height:24px;border:2.5px solid var(--border);border-top-color:var(--blue3);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading{text-align:center;padding:60px;color:var(--muted)}
    .loading p{margin-top:14px;font-size:14px}

    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .ticket-card{animation:fadeIn .3s ease}

    @media(max-width:480px){
      .main{padding:20px 16px}
      .welcome-title{font-size:20px}
      .nav-logo-text{display:none}
      .nav-logo-sub{display:none}
      .phone-badge{display:none}
    }
  </style>
</head>
<body>

<div class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">🏛️</div>
      <div>
        <div class="nav-logo-text">Delhi Municipal Corporation</div>
        <div class="nav-logo-sub">AI Citizen Helpline</div>
      </div>
    </a>
    <div class="nav-right">
      <span class="phone-badge" id="phoneDisplay"></span>
      <a href="/" class="nav-link">Home</a>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>
</div>

<div class="main">
  <div id="loading" class="loading"><div class="spinner"></div><p>Loading your complaints…</p></div>
  <div id="content" style="display:none"></div>
</div>

<script>
(function(){
  const loading     = document.getElementById('loading');
  const content     = document.getElementById('content');
  const phoneDisplay= document.getElementById('phoneDisplay');
  const logoutBtn   = document.getElementById('logoutBtn');

  logoutBtn.addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method:'POST' });
    location.href = '/login';
  });

  async function init() {
    const me = await fetch('/api/auth/me');
    if (!me.ok) { location.href = '/login'; return; }
    const user = await me.json();
    if (user.role !== 'citizen') { location.href = '/tickets'; return; }
    phoneDisplay.textContent = user.id;

    const res = await fetch('/api/my-tickets');
    if (!res.ok) { location.href = '/login'; return; }
    const tickets = await res.json();

    loading.style.display = 'none';
    content.style.display = 'block';

    if (!tickets.length) {
      content.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📭</div>
          <div class="empty-title">No complaints filed yet</div>
          <div class="empty-sub">Complaints you file via the DMC helpline will appear here.</div>
          <a href="/simulation" class="empty-cta">📞 Try Call Simulation</a>
        </div>`;
      return;
    }

    content.innerHTML = `
      <div class="welcome">
        <div class="welcome-title">My Complaints</div>
        <div class="welcome-sub">${tickets.length} complaint${tickets.length !== 1 ? 's' : ''} filed</div>
      </div>` + tickets.map(t => renderTicket(t)).join('');
  }

  function renderTicket(t) {
    const date  = new Date(t.createdAt).toLocaleString('en-IN');
    const notes = (t.notes || []).map(n => `
      <div class="note">
        <div class="note-text">${esc(n.text)}</div>
        <div class="note-meta">— Admin · ${new Date(n.at).toLocaleString('en-IN')}</div>
      </div>`).join('');

    const hasToken = t.uploadToken && new Date(t.uploadExpiry) > new Date();
    const uploadBtn = hasToken
      ? `<a class="upload-link" href="/upload/${t.uploadToken}" target="_blank">📎 Upload Documents</a>`
      : '';

    return `
      <div class="ticket-card">
        <div class="ticket-top">
          <div class="ticket-id">${esc(t.id)}</div>
          <span class="status-pill status-${(t.status||'open').replace(' ','-')}">${esc(t.status || 'open')}</span>
        </div>
        <div class="complaint-text">${esc(t.complaint)}</div>
        <div class="ticket-meta">
          <span class="meta-item">📅 ${date}</span>
          <span class="meta-item">📎 ${t.files?.length || 0} file${t.files?.length !== 1 ? 's' : ''}</span>
        </div>
        ${notes ? `<div class="notes-section"><div class="notes-label">Updates from DMC</div>${notes}</div>` : ''}
        ${uploadBtn}
      </div>`;
  }

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  init();
})();
</script>
</body>
</html>
